<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dev Studio — Project Explorer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/svg-pan-zoom@3.6.1/dist/svg-pan-zoom.min.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --sidebar-bg: #1e293b;
            --card-bg: rgba(30, 41, 59, 0.7);
            --accent-color: #38bdf8;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --border-color: rgba(255, 255, 255, 0.1);
            --glass-blur: blur(12px);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* ── Sidebar ── */
        aside {
            width: 300px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 24px;
            flex-shrink: 0;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 32px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--accent-color);
        }

        .nav-group {
            margin-bottom: 24px;
        }

        .nav-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-secondary);
            margin-bottom: 12px;
            font-weight: 600;
        }

        .nav-item {
            padding: 10px 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-secondary);
        }

        .nav-item:hover {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
        }

        .nav-item.active {
            background: var(--accent-color);
            color: var(--bg-color);
            font-weight: 600;
        }

        /* ── Main Content ── */
        main {
            flex-grow: 1;
            padding: 40px;
            overflow-y: auto;
            scroll-behavior: smooth;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 8px;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .meta {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        /* ── Cards & UI Elements ── */
        .card {
            background: var(--card-bg);
            backdrop-filter: var(--glass-blur);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 32px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            position: relative;
        }

        .card-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* ── Mermaid Customization ── */
        .mermaid-container {
            background: white;
            padding: 0;
            border-radius: 12px;
            overflow: hidden;
            height: 600px;
            position: relative;
            border: 1px solid var(--border-color);
        }

        .mermaid {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .graph-controls {
            position: absolute;
            top: 12px;
            right: 12px;
            z-index: 10;
            display: flex;
            gap: 8px;
        }

        .btn {
            background: var(--sidebar-bg);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn:hover {
            background: var(--accent-color);
            color: var(--bg-color);
        }

        /* ── Markdown Tables ── */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 1rem;
        }

        th {
            text-align: left;
            padding: 12px;
            border-bottom: 2px solid var(--border-color);
            color: var(--text-secondary);
            font-size: 0.85rem;
            text-transform: uppercase;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.95rem;
        }

        code {
            font-family: 'Fira Code', monospace;
            background: rgba(255, 255, 255, 0.1);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.9em;
        }

        pre code {
            display: block;
            padding: 16px;
            overflow-x: auto;
            background: #1e293b;
            border-radius: 8px;
            margin: 12px 0;
        }

        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
            background: var(--accent-color);
            color: var(--bg-color);
        }

        /* ── Animation ── */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .view-section {
            animation: fadeIn 0.4s ease-out;
        }

        #loading {
            position: fixed;
            inset: 0;
            background: var(--bg-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            transition: opacity 0.5s;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(56, 189, 248, 0.3);
            border-top-color: var(--accent-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div id="loading">
    <div class="spinner"></div>
    <p style="margin-top: 16px; color: var(--text-secondary)">Анализ карты проекта...</p>
</div>

<aside>
    <div class="logo">
        <span>🗺️</span> DevStudio
    </div>

    <div class="nav-group">
        <p class="nav-title">Обзор</p>

        <div class="nav-item" onclick="showSection('inventory')">📦 Файлы проекта</div>
        <div class="nav-item" onclick="showSection('api')">🔌 API Реестр</div>
        <div class="nav-item" onclick="showSection('env')">🔑 Окружение</div>
    </div>

    <div style="margin-top: auto; padding-top: 20px; border-top: 1px solid var(--border-color);">
        <p class="meta" id="update-time">Загрузка...</p>
    </div>
</aside>

<main>

    let projectData = {
        title: 'agsys',
        updated: '',
        mermaid: '',
        components: {},
        env: [],
        api: [],
        raw: ''
    };

    async function loadMap() {
        try {
            let text = '';
            if (window.PROJECT_MAP_RAW_B64) {
                text = decodeURIComponent(escape(atob(window.PROJECT_MAP_RAW_B64)));
            } else if (window.PROJECT_MAP_RAW) {
                text = window.PROJECT_MAP_RAW;
            } else {
                const response = await fetch('../PROJECT_MAP.md');
                text = await response.text();
            }
            projectData.raw = text;
            parseMarkdown(text);
            showSection('architecture');
            document.getElementById('loading').style.opacity = '0';
            setTimeout(() => document.getElementById('loading').style.display = 'none', 500);
        } catch (e) {
            console.error('Ошибка загрузки карты:', e);
            document.getElementById('content-area').innerHTML = `
                <div class="card" style="border-color: #ef4444">
                    <h2 style="color: #ef4444">Ошибка загрузки</h2>
                    <p>Не удалось автоматически загрузить <code>PROJECT_MAP.md</code> из-за ограничений безопасности браузера (CORS).</p>
                    <p style="margin-top: 10px">Для работы просмотрщика:</p>
                    <ol style="margin-left: 20px; margin-top: 10px">
                        <li>Запустите локальный сервер (например, <code>npx serve</code> или Live Server в VS Code).</li>
                        <li>Или используйте просмотрщик в IDE с поддержкой Mermaid.</li>
                    </ol>
                </div>
            `;
            document.getElementById('loading').style.display = 'none';
        }
    }

    function parseMarkdown(text) {
        const lines = text.split('\n');
        
        // Извлекаем дату обновления
        const updateLine = lines.find(l => l.startsWith('> Автоматически сгенерировано:'));
        if (updateLine) {
            const match = updateLine.match(/`(.+)`/);
            projectData.updated = match ? match[1] : 'Unknown';
            document.getElementById('update-time').innerText = 'Обновлено: ' + projectData.updated;
        }

        // Извлекаем Mermaid (теперь их два)
        const mermaidBlocks = [];
        let pos = 0;
        while ((pos = text.indexOf('```mermaid', pos)) !== -1) {
            const end = text.indexOf('```', pos + 10);
            if (end !== -1) {
                mermaidBlocks.push(text.substring(pos + 10, end).trim());
                pos = end + 3;
            } else break;
        }
        projectData.mermaidHigh = mermaidBlocks[0] || '';
        projectData.mermaidDetailed = mermaidBlocks[1] || '';
        projectData.mermaid = projectData.mermaidHigh; // Default

        // Извлекаем разделы для инвентаризации
        const sections = text.split('\n## ');
        sections.forEach(sec => {
            if (sec.startsWith('Компонент:')) {
                const titleMatch = sec.match(/`(.+)`/);
                if (titleMatch) {
                    const title = titleMatch[1];
                    const tableStart = sec.indexOf('|');
                    const tableEnd = sec.indexOf('\n\n', tableStart);
                    projectData.components[title] = sec.substring(tableStart, tableEnd === -1 ? undefined : tableEnd);
                }
            }
            if (sec.startsWith('API Реестр')) {
                const tableStart = sec.indexOf('|');
                projectData.apiTable = sec.substring(tableStart);
            }
            if (sec.startsWith('Переменные окружения')) {
                const tableStart = sec.indexOf('|');
                projectData.envTable = sec.substring(tableStart);
            }
            if (sec.startsWith('📊 Telemetry')) {
                const tableStart = sec.indexOf('|');
                projectData.telemetryTable = sec.substring(tableStart);
                
                // Извлекаем конкретные значения для UI
                const rows = projectData.telemetryTable.split('\n');
                projectData.stats = {
                    tokens: (rows.find(r => r.includes('Project Weight')) || '').match(/`~(.+) tokens`/)?.[1] || '0',
                    pressure: (rows.find(r => r.includes('Context Pressure')) || '').match(/`(.+)%`/)?.[1] || '0',
                    efficiency: (rows.find(r => r.includes('Map Efficiency')) || '').match(/`~(.+)%`/)?.[1] || '0'
                };
            }
        });
    }

    function showSection(sectionId) {
        const area = document.getElementById('content-area');
        
        // Update nav UI
        document.querySelectorAll('.nav-item').forEach(item => {
            item.classList.remove('active');
            const label = item.innerText.toLowerCase();
            if (label.includes('context') && sectionId === 'telemetry') item.classList.add('active');
            else if (label.includes('api') && sectionId === 'api') item.classList.add('active');
            else if (label.includes('окружение') && sectionId === 'env') item.classList.add('active');
            else if (label.includes('файлы') && sectionId === 'inventory') item.classList.add('active');
            else if (label.includes('архитектура') && sectionId === 'architecture') item.classList.add('active');
        });

        let html = '';

        switch(sectionId) {
            case 'architecture':
                html = `
                    <div class="view-section">
                        <header>
                            <h1>Архитектура проекта</h1>
                            <p class="meta">Визуализация структуры системы ChatAVG v2.3</p>
                        </header>
                        <div class="card">
                            <div class="card-title">
                                🗺️ Системный граф
                                <div style="margin-left: auto; display: flex; gap: 8px;">
                                    <button class="btn ${projectData.mermaid === projectData.mermaidHigh ? 'active' : ''}" onclick="switchMermaid('high')">Модули</button>
                                    <button class="btn ${projectData.mermaid === projectData.mermaidDetailed ? 'active' : ''}" onclick="switchMermaid('detailed')">Файлы</button>
                                </div>
                            </div>
                            <div class="mermaid-container">
                                <div class="graph-controls">
                                    <button class="btn" onclick="resetZoom()">Сброс</button>
                                </div>
                                <div class="mermaid" id="mermaid-graph">
                                    ${projectData.mermaid}
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                break;
            case 'inventory':
                html = `
                    <div class="view-section">
                        <header>
                            <h1>Инвентаризация файлов</h1>
                            <p class="meta">Все исходные коды, сгруппированные по компонентам</p>
                        </header>
                        ${Object.entries(projectData.components).map(([name, table]) => `
                            <div class="card">
                                <div class="card-title">📦 Компонент: <code>${name}</code></div>
                                <div class="markdown-body">${marked.parse(table)}</div>
                            </div>
                        `).join('')}
                    </div>
                `;
                break;
            case 'api':
                html = `
                    <div class="view-section">
                        <header>
                            <h1>API Реестр</h1>
                            <p class="meta">Список всех доступных HTTP эндпоинтов</p>
                        </header>
                        <div class="card">
                            <div class="markdown-body">${marked.parse(projectData.apiTable || 'Нет данных')}</div>
                        </div>
                    </div>
                `;
                break;
            case 'env':
                html = `
                    <div class="view-section">
                        <header>
                            <h1>Окружение</h1>
                            <p class="meta">Переменные process.env и их использование в коде</p>
                        </header>
                        <div class="card">
                            <div class="markdown-body">${marked.parse(projectData.envTable || 'Нет данных')}</div>
                        </div>
                    </div>
                `;
                break;
            case 'telemetry':
                const pressure = parseFloat(projectData.stats.pressure);
                const color = pressure > 80 ? '#ef4444' : (pressure > 50 ? '#f59e0b' : '#10b981');
                html = `
                    <div class="view-section">
                        <header>
                            <h1>📊 Context Health & Telemetry</h1>
                            <p class="meta">Оценка нагрузки на контекстное окно ИИ-агента</p>
                        </header>
                        
                        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px;">
                            <div class="card" style="margin-bottom: 0">
                                <div class="card-title">Вес проекта</div>
                                <div style="font-size: 2rem; font-weight: 800; color: var(--accent-color)">${projectData.stats.tokens}</div>
                                <p class="meta">~ токенов (estimate)</p>
                            </div>
                            <div class="card" style="margin-bottom: 0">
                                <div class="card-title">Context Pressure</div>
                                <div style="font-size: 2rem; font-weight: 800; color: ${color}">${projectData.stats.pressure}%</div>
                                <div style="width: 100%; height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; margin-top: 10px; overflow: hidden">
                                    <div style="width: ${projectData.stats.pressure}%; height: 100%; background: ${color}"></div>
                                </div>
                            </div>
                            <div class="card" style="margin-bottom: 0">
                                <div class="card-title">Эффективность карты</div>
                                <div style="font-size: 2rem; font-weight: 800; color: #10b981">${projectData.stats.efficiency}%</div>
                                <p class="meta">экономии контекста</p>
                            </div>
                        </div>

                        <div class="card">
                            <div class="card-title">📝 Подробная статистика</div>
                            <div class="markdown-body">${marked.parse(projectData.telemetryTable || 'Нет данных')}</div>
                        </div>

                        <div class="card" style="background: rgba(56, 189, 248, 0.1); border-color: var(--accent-color)">
                            <div class="card-title">💡 Советы по оптимизации</div>
                            <ul style="margin-left: 20px; color: var(--text-primary); line-height: 1.6">
                                <li>Используйте <b>PROJECT_MAP.md</b> для быстрого погружения в проект — это экономит до 90% окна.</li>
                                <li>Разделяйте большие задачи на этапы через <b>MISSIONS</b>.</li>
                                <li>Если контекст переполнен (pressure > 80%), попробуйте архивировать старые логи или начать новый чат.</li>
                            </ul>
                        </div>
                    </div>
                `;
                break;
        }

        area.innerHTML = html;
        
        if (sectionId === 'architecture') {
            mermaid.init(undefined, document.querySelectorAll('.mermaid'));
            setTimeout(initPanZoom, 500);
        }
    }

    let panZoomInstance = null;

    function initPanZoom() {
        const svg = document.querySelector('.mermaid svg');
        if (!svg) return;
        
        svg.setAttribute('width', '100%');
        svg.setAttribute('height', '100%');
        
        if (panZoomInstance) panZoomInstance.destroy();
        
        panZoomInstance = svgPanZoom(svg, {
            zoomEnabled: true,
            controlIconsEnabled: true,
            fit: true,
            center: true,
            minZoom: 0.1,
            maxZoom: 10
        });
    }

    function resetZoom() {
        if (panZoomInstance) panZoomInstance.reset();
    }

    function switchMermaid(type) {
        projectData.mermaid = (type === 'high') ? projectData.mermaidHigh : projectData.mermaidDetailed;
        showSection('architecture');
    }

    // Initialize
    mermaid.initialize({ 
        startOnLoad: false,
        theme: 'neutral',
        securityLevel: 'loose',
        flowchart: { useMaxWidth: true, htmlLabels: true, curve: 'basis' }
    });
    
    loadMap();
