version: '3.8'

services:
  gateway:
    build: .
    container_name: chatavg-gateway
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
      - CHATAVG_PORT=8080
      # CHATAVG_SECRET will be auto-generated in .env file in the data volume
    volumes:
      - gateway_data:/app/data
      - ./.env:/app/.env
    restart: unless-stopped
    depends_on:
      - llama

  llama:
    image: ghcr.io/ggerganov/llama.cpp:server
    container_name: chatavg-llama
    # ports:
    #   - "8081:8080" # Removed to close external access. Use internal network.
    volumes:
      - ./models_cache:/models
    command: -m /models/your-model.gguf -c 4096 --host 0.0.0.0 --port 8080
    restart: unless-stopped

volumes:
  gateway_data:
